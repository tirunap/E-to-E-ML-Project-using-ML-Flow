<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 0;
        }
        .form-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: -30px;
            position: relative;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Wine Quality ML Project</a>
        </div>
    </nav>

    <section class="hero">
        <div class="container text-center">
            <h1 class="display-4">Wine Quality Prediction</h1>
            <p class="lead">Predict the quality of wine based on its chemical properties using Machine Learning</p>
        </div>
    </section>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-container">
                    <h2 class="text-center mb-4">Enter Wine Properties</h2>
                    <form action="/predict" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="fixed_acidity" class="form-label">Fixed Acidity</label>
                                <input type="number" step="0.01" class="form-control" id="fixed_acidity" name="fixed_acidity" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="volatile_acidity" class="form-label">Volatile Acidity</label>
                                <input type="number" step="0.01" class="form-control" id="volatile_acidity" name="volatile_acidity" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="citric_acid" class="form-label">Citric Acid</label>
                                <input type="number" step="0.01" class="form-control" id="citric_acid" name="citric_acid" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="residual_sugar" class="form-label">Residual Sugar</label>
                                <input type="number" step="0.01" class="form-control" id="residual_sugar" name="residual_sugar" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="chlorides" class="form-label">Chlorides</label>
                                <input type="number" step="0.01" class="form-control" id="chlorides" name="chlorides" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="free_sulfur_dioxide" class="form-label">Free Sulfur Dioxide</label>
                                <input type="number" step="0.01" class="form-control" id="free_sulfur_dioxide" name="free_sulfur_dioxide" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="total_sulfur_dioxide" class="form-label">Total Sulfur Dioxide</label>
                                <input type="number" step="0.01" class="form-control" id="total_sulfur_dioxide" name="total_sulfur_dioxide" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="density" class="form-label">Density</label>
                                <input type="number" step="0.01" class="form-control" id="density" name="density" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="pH" class="form-label">pH</label>
                                <input type="number" step="0.01" class="form-control" id="pH" name="pH" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="sulphates" class="form-label">Sulphates</label>
                                <input type="number" step="0.01" class="form-control" id="sulphates" name="sulphates" required>
                            </div>
                        </div>
                    <form action="/predict" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="fixed_acidity" class="form-label">Fixed Acidity</label>
                                <input type="number" step="0.01" class="form-control" id="fixed_acidity" name="fixed_acidity" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="volatile_acidity" class="form-label">Volatile Acidity</label>
                                <input type="number" step="0.01" class="form-control" id="volatile_acidity" name="volatile_acidity" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="citric_acid" class="form-label">Citric Acid</label>
                                <input type="number" step="0.01" class="form-control" id="citric_acid" name="citric_acid" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="residual_sugar" class="form-label">Residual Sugar</label>
                                <input type="number" step="0.01" class="form-control" id="residual_sugar" name="residual_sugar" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="chlorides" class="form-label">Chlorides</label>
                                <input type="number" step="0.01" class="form-control" id="chlorides" name="chlorides" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="free_sulfur_dioxide" class="form-label">Free Sulfur Dioxide</label>
                                <input type="number" step="0.01" class="form-control" id="free_sulfur_dioxide" name="free_sulfur_dioxide" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="total_sulfur_dioxide" class="form-label">Total Sulfur Dioxide</label>
                                <input type="number" step="0.01" class="form-control" id="total_sulfur_dioxide" name="total_sulfur_dioxide" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="density" class="form-label">Density</label>
                                <input type="number" step="0.01" class="form-control" id="density" name="density" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="pH" class="form-label">pH</label>
                                <input type="number" step="0.01" class="form-control" id="pH" name="pH" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="sulphates" class="form-label">Sulphates</label>
                                <input type="number" step="0.01" class="form-control" id="sulphates" name="sulphates" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="alcohol" class="form-label">Alcohol</label>
                            <input type="number" step="0.01" class="form-control" id="alcohol" name="alcohol" required>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg">Predict Quality</button>
                        </div>
                    </form>
                    
                    {% if prediction is defined %}
                    <div class="mt-4 alert alert-success text-center">
                        <h4>Predicted Wine Quality: {{ prediction }}</h4>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
