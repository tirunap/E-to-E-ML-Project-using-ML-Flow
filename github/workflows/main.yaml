name: workflow

on:
  push:
    branches: [ main ]
    paths: 
      - '**.py'
      - '**.yaml'
      - '**.ipynb'
      - '**.md'
      - 'README.md'

permissions:
  contents: read  
  id-token: write

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/

  deploy:
    name: Continuous Deployment to AWS
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v3

      # Configure AWS credentials (stored in GitHub Secrets)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1   # change to your region

      # Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build, tag, and push Docker image
      - name: Build, tag, and push image to Amazon ECR
        run: |
          IMAGE_REPO_NAME=my-ml-project
          IMAGE_TAG=${{ github.sha }}
          docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
          docker tag $IMAGE_REPO_NAME:$IMAGE_TAG ${{ steps.login-ecr.outputs.registry }}/$IMAGE_REPO_NAME:$IMAGE_TAG
          docker push ${{ steps.login-ecr.outputs.registry }}/$IMAGE_REPO_NAME:$IMAGE_TAG

      # Deploy to ECS
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ecs-task-def.json   # your ECS task definition file
          service: my-ecs-service              # your ECS service name
          cluster: my-ecs-cluster              # your ECS cluster name
          wait-for-service-stability: 